# Pre-commit hooks — https://pre-commit.com
# Install:  pre-commit install
# Run all:  pre-commit run --all-files

fail_fast: false

repos:
  # ── Secrets ──
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  # ── File hygiene ──
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$|^pnpm-lock\.yaml$
      - id: end-of-file-fixer
        exclude: ^pnpm-lock\.yaml$
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^src/.*/customize\.toml$
      - id: check-json
      - id: check-toml
      - id: detect-private-key

  # ── Shell ──
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  # ── GitHub Actions ──
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  # ── Markdown ──
  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: v0.1.69
    hooks:
      - id: rumdl

  # ── JS / JSON / YAML formatting + linting (delegate to pnpm) ──
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: pnpm exec prettier --write --ignore-unknown
        language: system
        types_or: [javascript, json, yaml]
        pass_filenames: true

      - id: eslint
        name: eslint
        entry: pnpm exec eslint --fix --max-warnings=0
        language: system
        files: \.(js|cjs|mjs|yaml)$
        exclude: ^pnpm-lock\.yaml$
        pass_filenames: true

      - id: validate-skills
        name: validate skills (strict)
        entry: pnpm validate:skills
        language: system
        pass_filenames: false
        files: ^src/.*\.(md|yaml|csv)$

      - id: validate-refs
        name: validate file refs (strict)
        entry: pnpm validate:refs
        language: system
        pass_filenames: false
        files: \.(md|yaml|csv)$
