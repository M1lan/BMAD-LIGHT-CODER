<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMAD Method — UML Class Diagram</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #08080f;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    font-family: system-ui, 'Segoe UI', sans-serif;
    padding: 32px 16px;
  }
  svg { display: block; }
</style>
</head>
<body>
<svg width="1400" height="1060" viewBox="0 0 1400 1060" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dotgrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff08"/>
    </pattern>
    <!-- Inheritance arrow (hollow triangle) -->
    <marker id="inherit" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#08080f" stroke="#00d4ff" stroke-width="1.5"/>
    </marker>
    <!-- Composition (filled diamond) -->
    <marker id="compose" markerWidth="12" markerHeight="10" refX="2" refY="5" orient="auto">
      <polygon points="0 5, 5 0, 10 5, 5 10" fill="#9b59ff" stroke="#9b59ff" stroke-width="1"/>
    </marker>
    <!-- Association arrow -->
    <marker id="assoc" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1060" fill="#08080f"/>
  <rect width="1400" height="1060" fill="url(#dotgrid)"/>

  <!-- Title -->
  <text x="48" y="52" font-family="system-ui,'Segoe UI',sans-serif" font-size="11" font-weight="700"
        letter-spacing="0.12em" fill="#00d4ff">BMAD METHOD</text>
  <text x="48" y="74" font-family="system-ui,'Segoe UI',sans-serif" font-size="22" font-weight="700"
        fill="#e8eaf0">UML Class Diagram</text>
  <text x="48" y="96" font-family="system-ui,'Segoe UI',sans-serif" font-size="12" fill="#6b7280">
    Core class hierarchy — abstract classes, inheritance, composition, and associations</text>

  <!-- ===== CLASS BOX HELPER ===== -->
  <!-- Structure: header (name) | divider | attributes | divider | methods -->

  <!-- ===== BMADModule (abstract, top-center) ===== -->
  <rect x="540" y="120" width="320" height="170" rx="10" fill="#00d4ff0e" stroke="#00d4ff" stroke-width="2"/>
  <!-- header -->
  <rect x="540" y="120" width="320" height="42" rx="10" fill="#00d4ff20"/>
  <rect x="540" y="152" width="320" height="10" fill="#00d4ff20"/>
  <text x="700" y="137" font-family="system-ui,'Segoe UI',sans-serif" font-size="10"
        fill="#00d4ff80" text-anchor="middle" font-style="italic">«abstract»</text>
  <text x="700" y="153" font-family="system-ui,'Segoe UI',sans-serif" font-size="14"
        font-weight="700" fill="#00d4ff" text-anchor="middle">BMADModule</text>
  <!-- divider -->
  <line x1="540" y1="162" x2="860" y2="162" stroke="#00d4ff30" stroke-width="1"/>
  <!-- attributes -->
  <text x="560" y="180" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">- id: string</text>
  <text x="560" y="196" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">- name: string</text>
  <text x="560" y="212" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">- version: semver</text>
  <text x="560" y="228" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">- skills: Skill[]</text>
  <!-- divider -->
  <line x1="540" y1="236" x2="860" y2="236" stroke="#00d4ff20" stroke-width="1"/>
  <!-- methods -->
  <text x="560" y="254" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">+ install(): void</text>
  <text x="560" y="270" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">+ activate(): void</text>

  <!-- CoreModule -->
  <rect x="200" y="380" width="260" height="150" rx="10" fill="#9b59ff14" stroke="#9b59ff" stroke-width="2"/>
  <rect x="200" y="380" width="260" height="38" rx="10" fill="#9b59ff25"/>
  <rect x="200" y="408" width="260" height="10" fill="#9b59ff25"/>
  <text x="330" y="402" font-family="system-ui,'Segoe UI',sans-serif" font-size="14"
        font-weight="700" fill="#9b59ff" text-anchor="middle">CoreModule</text>
  <line x1="200" y1="418" x2="460" y2="418" stroke="#9b59ff30" stroke-width="1"/>
  <text x="220" y="436" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">- agents: Agent[]</text>
  <text x="220" y="452" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">- utilities: Skill[]</text>
  <text x="220" y="468" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">- config: ConfigRegistry</text>
  <line x1="200" y1="476" x2="460" y2="476" stroke="#9b59ff20" stroke-width="1"/>
  <text x="220" y="494" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">+ loadAgents(): void</text>
  <text x="220" y="510" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">+ runUtility(name): void</text>

  <!-- BMMModule -->
  <rect x="940" y="380" width="260" height="150" rx="10" fill="#9b59ff14" stroke="#9b59ff" stroke-width="2"/>
  <rect x="940" y="380" width="260" height="38" rx="10" fill="#9b59ff25"/>
  <rect x="940" y="408" width="260" height="10" fill="#9b59ff25"/>
  <text x="1070" y="402" font-family="system-ui,'Segoe UI',sans-serif" font-size="14"
        font-weight="700" fill="#9b59ff" text-anchor="middle">BMMModule</text>
  <line x1="940" y1="418" x2="1200" y2="418" stroke="#9b59ff30" stroke-width="1"/>
  <text x="960" y="436" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">- phases: Phase[]</text>
  <text x="960" y="452" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">- workflows: Workflow[]</text>
  <text x="960" y="468" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">- artifacts: Artifact[]</text>
  <line x1="940" y1="476" x2="1200" y2="476" stroke="#9b59ff20" stroke-width="1"/>
  <text x="960" y="494" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">+ runPhase(n): void</text>
  <text x="960" y="510" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">+ getWorkflow(id): Workflow</text>

  <!-- Skill (abstract) -->
  <rect x="540" y="380" width="320" height="170" rx="10" fill="#00d4ff0e" stroke="#00d4ff" stroke-width="2"/>
  <rect x="540" y="380" width="320" height="42" rx="10" fill="#00d4ff18"/>
  <rect x="540" y="412" width="320" height="10" fill="#00d4ff18"/>
  <text x="700" y="396" font-family="system-ui,'Segoe UI',sans-serif" font-size="10"
        fill="#00d4ff80" text-anchor="middle" font-style="italic">«abstract»</text>
  <text x="700" y="412" font-family="system-ui,'Segoe UI',sans-serif" font-size="14"
        font-weight="700" fill="#00d4ff" text-anchor="middle">Skill</text>
  <line x1="540" y1="422" x2="860" y2="422" stroke="#00d4ff30" stroke-width="1"/>
  <text x="560" y="440" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">- name: string</text>
  <text x="560" y="456" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">- phase: PhaseEnum</text>
  <text x="560" y="472" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">- isOptional: boolean</text>
  <text x="560" y="488" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">- prerequisites: Skill[]</text>
  <line x1="540" y1="496" x2="860" y2="496" stroke="#00d4ff20" stroke-width="1"/>
  <text x="560" y="514" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">+ execute(ctx: Context): Artifact</text>
  <text x="560" y="530" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">+ validate(): boolean</text>

  <!-- PhaseSkill -->
  <rect x="540" y="640" width="320" height="150" rx="10" fill="#ff950014" stroke="#ff9500" stroke-width="2"/>
  <rect x="540" y="640" width="320" height="38" rx="10" fill="#ff950025"/>
  <rect x="540" y="668" width="320" height="10" fill="#ff950025"/>
  <text x="700" y="662" font-family="system-ui,'Segoe UI',sans-serif" font-size="14"
        font-weight="700" fill="#ff9500" text-anchor="middle">PhaseSkill</text>
  <line x1="540" y1="678" x2="860" y2="678" stroke="#ff950030" stroke-width="1"/>
  <text x="560" y="696" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">- phaseNumber: 1 | 2 | 3 | 4</text>
  <text x="560" y="712" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">- assignedAgent: Agent</text>
  <text x="560" y="728" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">- outputArtifact: Artifact</text>
  <line x1="540" y1="736" x2="860" y2="736" stroke="#ff950020" stroke-width="1"/>
  <text x="560" y="754" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">+ getAgent(): Agent</text>
  <text x="560" y="770" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">+ getOutputArtifact(): Artifact</text>

  <!-- Concrete PhaseSkill subclasses (row at bottom) -->
  <!-- AnalysisSkill -->
  <rect x="80" y="870" width="180" height="100" rx="8" fill="#9b59ff14" stroke="#9b59ff" stroke-width="1.5"/>
  <rect x="80" y="870" width="180" height="32" rx="8" fill="#9b59ff20"/>
  <text x="170" y="890" font-family="system-ui,'Segoe UI',sans-serif" font-size="12"
        font-weight="700" fill="#9b59ff" text-anchor="middle">AnalysisSkill</text>
  <line x1="80" y1="902" x2="260" y2="902" stroke="#9b59ff20" stroke-width="1"/>
  <text x="100" y="918" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#9b9eb0">phase = 1</text>
  <text x="100" y="932" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#9b9eb0">agents: Mary, Paige</text>
  <text x="100" y="946" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#9b9eb0">+ brainstorm()</text>
  <text x="100" y="960" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#9b9eb0">+ createBrief()</text>

  <!-- PlanningSkill -->
  <rect x="300" y="870" width="180" height="100" rx="8" fill="#00d4ff14" stroke="#00d4ff" stroke-width="1.5"/>
  <rect x="300" y="870" width="180" height="32" rx="8" fill="#00d4ff20"/>
  <text x="390" y="890" font-family="system-ui,'Segoe UI',sans-serif" font-size="12"
        font-weight="700" fill="#00d4ff" text-anchor="middle">PlanningSkill</text>
  <line x1="300" y1="902" x2="480" y2="902" stroke="#00d4ff20" stroke-width="1"/>
  <text x="320" y="918" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#9b9eb0">phase = 2</text>
  <text x="320" y="932" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#9b9eb0">agents: John, Sally</text>
  <text x="320" y="946" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#9b9eb0">+ createPRD()</text>
  <text x="320" y="960" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#9b9eb0">+ createUX()</text>

  <!-- SolutioningSkill -->
  <rect x="520" y="870" width="200" height="100" rx="8" fill="#ff950014" stroke="#ff9500" stroke-width="1.5"/>
  <rect x="520" y="870" width="200" height="32" rx="8" fill="#ff950020"/>
  <text x="620" y="890" font-family="system-ui,'Segoe UI',sans-serif" font-size="12"
        font-weight="700" fill="#ff9500" text-anchor="middle">SolutioningSkill</text>
  <line x1="520" y1="902" x2="720" y2="902" stroke="#ff950020" stroke-width="1"/>
  <text x="540" y="918" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#9b9eb0">phase = 3</text>
  <text x="540" y="932" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#9b9eb0">agent: Winston</text>
  <text x="540" y="946" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#9b9eb0">+ designArchitecture()</text>
  <text x="540" y="960" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#9b9eb0">+ createEpics()</text>

  <!-- ImplementationSkill -->
  <rect x="760" y="870" width="220" height="100" rx="8" fill="#22c55e14" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="760" y="870" width="220" height="32" rx="8" fill="#22c55e20"/>
  <text x="870" y="890" font-family="system-ui,'Segoe UI',sans-serif" font-size="12"
        font-weight="700" fill="#22c55e" text-anchor="middle">ImplementationSkill</text>
  <line x1="760" y1="902" x2="980" y2="902" stroke="#22c55e20" stroke-width="1"/>
  <text x="780" y="918" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#9b9eb0">phase = 4</text>
  <text x="780" y="932" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#9b9eb0">agent: Amelia</text>
  <text x="780" y="946" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#9b9eb0">+ devStory()</text>
  <text x="780" y="960" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#9b9eb0">+ codeReview()</text>

  <!-- Agent class -->
  <rect x="1060" y="640" width="280" height="160" rx="10" fill="#9b59ff14" stroke="#9b59ff" stroke-width="2"/>
  <rect x="1060" y="640" width="280" height="38" rx="10" fill="#9b59ff25"/>
  <rect x="1060" y="668" width="280" height="10" fill="#9b59ff25"/>
  <text x="1200" y="662" font-family="system-ui,'Segoe UI',sans-serif" font-size="14"
        font-weight="700" fill="#9b59ff" text-anchor="middle">Agent</text>
  <line x1="1060" y1="678" x2="1340" y2="678" stroke="#9b59ff30" stroke-width="1"/>
  <text x="1080" y="696" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">- name: string</text>
  <text x="1080" y="712" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">- role: string</text>
  <text x="1080" y="728" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">- phase: PhaseEnum</text>
  <text x="1080" y="744" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">- persona: string</text>
  <line x1="1060" y1="752" x2="1340" y2="752" stroke="#9b59ff20" stroke-width="1"/>
  <text x="1080" y="770" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">+ activate(): void</text>
  <text x="1080" y="786" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">+ executeSkill(s: Skill): Artifact</text>

  <!-- Artifact class -->
  <rect x="1060" y="860" width="280" height="150" rx="10" fill="#ff950014" stroke="#ff9500" stroke-width="2"/>
  <rect x="1060" y="860" width="280" height="38" rx="10" fill="#ff950025"/>
  <rect x="1060" y="888" width="280" height="10" fill="#ff950025"/>
  <text x="1200" y="882" font-family="system-ui,'Segoe UI',sans-serif" font-size="14"
        font-weight="700" fill="#ff9500" text-anchor="middle">Artifact</text>
  <line x1="1060" y1="898" x2="1340" y2="898" stroke="#ff950030" stroke-width="1"/>
  <text x="1080" y="916" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">- id: uuid</text>
  <text x="1080" y="932" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">- type: ArtifactTypeEnum</text>
  <text x="1080" y="948" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">- filePath: string</text>
  <text x="1080" y="964" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">- createdBy: Agent</text>
  <line x1="1060" y1="972" x2="1340" y2="972" stroke="#ff950020" stroke-width="1"/>
  <text x="1080" y="990" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">+ persist(): void</text>

  <!-- ===== INHERITANCE ARROWS ===== -->
  <!-- CoreModule extends BMADModule -->
  <line x1="330" y1="380" x2="600" y2="290" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#inherit)"/>
  <!-- BMMModule extends BMADModule -->
  <line x1="1070" y1="380" x2="800" y2="290" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#inherit)"/>
  <!-- Skill extends BMADModule (conceptual — both in module) -->
  <!-- PhaseSkill extends Skill -->
  <line x1="700" y1="640" x2="700" y2="550" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#inherit)"/>
  <!-- AnalysisSkill extends PhaseSkill -->
  <line x1="170" y1="870" x2="590" y2="790" stroke="#ff9500" stroke-width="1.5" marker-end="url(#inherit)"/>
  <!-- PlanningSkill extends PhaseSkill -->
  <line x1="390" y1="870" x2="630" y2="790" stroke="#ff9500" stroke-width="1.5" marker-end="url(#inherit)"/>
  <!-- SolutioningSkill extends PhaseSkill -->
  <line x1="620" y1="870" x2="700" y2="790" stroke="#ff9500" stroke-width="1.5" marker-end="url(#inherit)"/>
  <!-- ImplementationSkill extends PhaseSkill -->
  <line x1="870" y1="870" x2="770" y2="790" stroke="#ff9500" stroke-width="1.5" marker-end="url(#inherit)"/>

  <!-- BMADModule composes Skill -->
  <line x1="700" y1="290" x2="700" y2="380" stroke="#9b59ff" stroke-width="1.5" marker-end="url(#compose)"/>
  <text x="720" y="340" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#9b59ff">1..*</text>

  <!-- PhaseSkill associates Agent -->
  <line x1="860" y1="720" x2="1060" y2="700" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#assoc)"/>
  <text x="950" y="706" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#6b7280">assignedAgent</text>

  <!-- PhaseSkill associates Artifact -->
  <line x1="860" y1="760" x2="1060" y2="890" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#assoc)"/>
  <text x="940" y="820" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#6b7280">outputArtifact</text>

  <!-- Legend -->
  <rect x="48" y="130" width="420" height="120" rx="8" fill="#ffffff05" stroke="#ffffff0f" stroke-width="1"/>
  <text x="68" y="152" font-family="system-ui,'Segoe UI',sans-serif" font-size="10"
        font-weight="700" letter-spacing="0.08em" fill="#6b7280">LEGEND</text>
  <!-- Inheritance -->
  <line x1="68" y1="172" x2="108" y2="172" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#inherit)"/>
  <text x="116" y="176" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">Inheritance (extends)</text>
  <!-- Composition -->
  <line x1="68" y1="198" x2="108" y2="198" stroke="#9b59ff" stroke-width="1.5" marker-end="url(#compose)"/>
  <text x="116" y="202" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">Composition (owns)</text>
  <!-- Association -->
  <line x1="68" y1="224" x2="108" y2="224" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#assoc)"/>
  <text x="116" y="228" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">Association (uses)</text>
  <!-- Abstract -->
  <rect x="68" y="234" width="100" height="20" rx="4" fill="#00d4ff0e" stroke="#00d4ff" stroke-width="1"/>
  <text x="118" y="248" font-family="system-ui,'Segoe UI',sans-serif" font-size="9"
        fill="#00d4ff80" text-anchor="middle" font-style="italic">«abstract»</text>
  <text x="178" y="248" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">Abstract class</text>

  <!-- Watermark -->
  <text x="1352" y="1042" font-family="system-ui,'Segoe UI',sans-serif" font-size="10"
        letter-spacing="0.06em" fill="#ffffff14" text-anchor="end">BMAD METHOD</text>
</svg>
</body>
</html>
