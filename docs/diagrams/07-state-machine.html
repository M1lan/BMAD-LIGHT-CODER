<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMAD Method — UML State Machine</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #08080f;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    font-family: system-ui, 'Segoe UI', sans-serif;
    padding: 32px 16px;
  }
  svg { display: block; }
</style>
</head>
<body>
<svg width="1400" height="1060" viewBox="0 0 1400 1060" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dotgrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff08"/>
    </pattern>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d4ff" opacity="0.9"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9500" opacity="0.9"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff4444" opacity="0.9"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e" opacity="0.9"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9b59ff" opacity="0.9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1060" fill="#08080f"/>
  <rect width="1400" height="1060" fill="url(#dotgrid)"/>

  <!-- Title -->
  <text x="48" y="52" font-family="system-ui,'Segoe UI',sans-serif" font-size="11" font-weight="700"
        letter-spacing="0.12em" fill="#00d4ff">BMAD METHOD</text>
  <text x="48" y="74" font-family="system-ui,'Segoe UI',sans-serif" font-size="22" font-weight="700"
        fill="#e8eaf0">UML State Machine — Artifact Lifecycle</text>
  <text x="48" y="96" font-family="system-ui,'Segoe UI',sans-serif" font-size="12" fill="#6b7280">
    States and transitions of a BMAD work item from ideation to done</text>

  <!-- ===== INITIAL STATE ===== -->
  <circle cx="120" cy="200" r="16" fill="#00d4ff"/>
  <text x="148" y="204" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">start</text>
  <line x1="136" y1="200" x2="200" y2="200" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- ===== STATE BOXES ===== -->
  <!-- Layout: 3 columns, rows spaced 130px apart -->
  <!-- Col 1 x=200, Col 2 x=560, Col 3 x=920 -->
  <!-- Row 1 y=168, Row 2 y=298, Row 3 y=428, Row 4 y=558, Row 5 y=688, Row 6 y=818 -->

  <!-- State: Ideation (col1, row1) -->
  <rect x="200" y="168" width="200" height="64" rx="32" fill="#9b59ff18" stroke="#9b59ff" stroke-width="2"/>
  <text x="300" y="196" font-family="system-ui,'Segoe UI',sans-serif" font-size="13"
        font-weight="700" fill="#e8eaf0" text-anchor="middle">Ideation</text>
  <text x="300" y="216" font-family="system-ui,'Segoe UI',sans-serif" font-size="10"
        fill="#9b9eb0" text-anchor="middle">brainstorm active</text>

  <!-- State: Brief (col1, row2) -->
  <rect x="200" y="298" width="200" height="64" rx="32" fill="#9b59ff18" stroke="#9b59ff" stroke-width="2"/>
  <text x="300" y="326" font-family="system-ui,'Segoe UI',sans-serif" font-size="13"
        font-weight="700" fill="#e8eaf0" text-anchor="middle">Brief</text>
  <text x="300" y="346" font-family="system-ui,'Segoe UI',sans-serif" font-size="10"
        fill="#9b9eb0" text-anchor="middle">product brief created</text>

  <!-- State: Planning (col2, row1) -->
  <rect x="560" y="168" width="200" height="64" rx="32" fill="#00d4ff18" stroke="#00d4ff" stroke-width="2"/>
  <text x="660" y="196" font-family="system-ui,'Segoe UI',sans-serif" font-size="13"
        font-weight="700" fill="#e8eaf0" text-anchor="middle">Planning</text>
  <text x="660" y="216" font-family="system-ui,'Segoe UI',sans-serif" font-size="10"
        fill="#9b9eb0" text-anchor="middle">PRD in progress</text>

  <!-- State: Design (col2, row2) -->
  <rect x="560" y="298" width="200" height="64" rx="32" fill="#00d4ff18" stroke="#00d4ff" stroke-width="2"/>
  <text x="660" y="326" font-family="system-ui,'Segoe UI',sans-serif" font-size="13"
        font-weight="700" fill="#e8eaf0" text-anchor="middle">Design</text>
  <text x="660" y="346" font-family="system-ui,'Segoe UI',sans-serif" font-size="10"
        fill="#9b9eb0" text-anchor="middle">UX design in progress</text>

  <!-- State: Architecture (col3, row1) -->
  <rect x="920" y="168" width="200" height="64" rx="32" fill="#ff950018" stroke="#ff9500" stroke-width="2"/>
  <text x="1020" y="196" font-family="system-ui,'Segoe UI',sans-serif" font-size="13"
        font-weight="700" fill="#e8eaf0" text-anchor="middle">Architecture</text>
  <text x="1020" y="216" font-family="system-ui,'Segoe UI',sans-serif" font-size="10"
        fill="#9b9eb0" text-anchor="middle">arch spine being built</text>

  <!-- State: Ready (col3, row2) -->
  <rect x="920" y="298" width="200" height="64" rx="32" fill="#ff950018" stroke="#ff9500" stroke-width="2"/>
  <text x="1020" y="326" font-family="system-ui,'Segoe UI',sans-serif" font-size="13"
        font-weight="700" fill="#e8eaf0" text-anchor="middle">Ready</text>
  <text x="1020" y="346" font-family="system-ui,'Segoe UI',sans-serif" font-size="10"
        fill="#9b9eb0" text-anchor="middle">epics &amp; stories complete</text>

  <!-- State: InSprint (col1, row3) -->
  <rect x="200" y="428" width="200" height="64" rx="32" fill="#22c55e18" stroke="#22c55e" stroke-width="2"/>
  <text x="300" y="456" font-family="system-ui,'Segoe UI',sans-serif" font-size="13"
        font-weight="700" fill="#e8eaf0" text-anchor="middle">InSprint</text>
  <text x="300" y="476" font-family="system-ui,'Segoe UI',sans-serif" font-size="10"
        fill="#9b9eb0" text-anchor="middle">sprint planned</text>

  <!-- State: InDevelopment (col2, row3) -->
  <rect x="560" y="428" width="200" height="64" rx="32" fill="#22c55e18" stroke="#22c55e" stroke-width="2"/>
  <text x="660" y="456" font-family="system-ui,'Segoe UI',sans-serif" font-size="13"
        font-weight="700" fill="#e8eaf0" text-anchor="middle">InDevelopment</text>
  <text x="660" y="476" font-family="system-ui,'Segoe UI',sans-serif" font-size="10"
        fill="#9b9eb0" text-anchor="middle">dev story active</text>

  <!-- State: InReview (col3, row3) -->
  <rect x="920" y="428" width="200" height="64" rx="32" fill="#22c55e18" stroke="#22c55e" stroke-width="2"/>
  <text x="1020" y="456" font-family="system-ui,'Segoe UI',sans-serif" font-size="13"
        font-weight="700" fill="#e8eaf0" text-anchor="middle">InReview</text>
  <text x="1020" y="476" font-family="system-ui,'Segoe UI',sans-serif" font-size="10"
        fill="#9b9eb0" text-anchor="middle">code review in progress</text>

  <!-- State: Tested (col2, row4) -->
  <rect x="560" y="558" width="200" height="64" rx="32" fill="#22c55e28" stroke="#22c55e" stroke-width="2"/>
  <text x="660" y="586" font-family="system-ui,'Segoe UI',sans-serif" font-size="13"
        font-weight="700" fill="#e8eaf0" text-anchor="middle">Tested</text>
  <text x="660" y="606" font-family="system-ui,'Segoe UI',sans-serif" font-size="10"
        fill="#9b9eb0" text-anchor="middle">e2e tests passing</text>

  <!-- State: Done (col2, row5) -->
  <rect x="560" y="688" width="200" height="64" rx="32" fill="#22c55e40" stroke="#22c55e" stroke-width="2.5"/>
  <text x="660" y="716" font-family="system-ui,'Segoe UI',sans-serif" font-size="15"
        font-weight="700" fill="#22c55e" text-anchor="middle">Done</text>
  <text x="660" y="736" font-family="system-ui,'Segoe UI',sans-serif" font-size="10"
        fill="#9b9eb0" text-anchor="middle">merged &amp; deployed</text>

  <!-- FINAL STATE -->
  <circle cx="660" cy="820" r="16" fill="none" stroke="#22c55e" stroke-width="2"/>
  <circle cx="660" cy="820" r="10" fill="#22c55e"/>
  <line x1="660" y1="752" x2="660" y2="804" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ===== FORWARD TRANSITIONS ===== -->
  <!-- Ideation → Brief -->
  <line x1="300" y1="232" x2="300" y2="298" stroke="#9b59ff" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <rect x="210" y="256" width="100" height="18" rx="4" fill="#08080f" opacity="0.9"/>
  <text x="260" y="268" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#9b9eb0" text-anchor="middle">brief created</text>

  <!-- Brief → Planning -->
  <line x1="400" y1="330" x2="560" y2="200" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <rect x="440" y="248" width="80" height="18" rx="4" fill="#08080f" opacity="0.9"/>
  <text x="480" y="260" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#9b9eb0" text-anchor="middle">approved</text>

  <!-- Planning → Design -->
  <line x1="660" y1="232" x2="660" y2="298" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <rect x="570" y="256" width="100" height="18" rx="4" fill="#08080f" opacity="0.9"/>
  <text x="620" y="268" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#9b9eb0" text-anchor="middle">PRD validated</text>

  <!-- Design → Architecture -->
  <line x1="760" y1="200" x2="920" y2="200" stroke="#ff9500" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <rect x="800" y="188" width="80" height="18" rx="4" fill="#08080f" opacity="0.9"/>
  <text x="840" y="200" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#9b9eb0" text-anchor="middle">UX approved</text>

  <!-- Architecture → Ready -->
  <line x1="1020" y1="232" x2="1020" y2="298" stroke="#ff9500" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <rect x="930" y="256" width="100" height="18" rx="4" fill="#08080f" opacity="0.9"/>
  <text x="980" y="268" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#9b9eb0" text-anchor="middle">epics created</text>

  <!-- Ready → InSprint -->
  <line x1="920" y1="330" x2="400" y2="460" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="620" y="378" width="100" height="18" rx="4" fill="#08080f" opacity="0.9"/>
  <text x="670" y="390" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#9b9eb0" text-anchor="middle">sprint planned</text>

  <!-- InSprint → InDevelopment -->
  <line x1="400" y1="460" x2="560" y2="460" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="430" y="448" width="100" height="18" rx="4" fill="#08080f" opacity="0.9"/>
  <text x="480" y="460" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#9b9eb0" text-anchor="middle">story started</text>

  <!-- InDevelopment → InReview -->
  <line x1="760" y1="460" x2="920" y2="460" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="790" y="448" width="100" height="18" rx="4" fill="#08080f" opacity="0.9"/>
  <text x="840" y="460" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#9b9eb0" text-anchor="middle">impl complete</text>

  <!-- InReview → Tested -->
  <line x1="1020" y1="492" x2="760" y2="558" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="850" y="508" width="100" height="18" rx="4" fill="#08080f" opacity="0.9"/>
  <text x="900" y="520" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#9b9eb0" text-anchor="middle">review passed</text>

  <!-- Tested → Done -->
  <line x1="660" y1="622" x2="660" y2="688" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="570" y="646" width="100" height="18" rx="4" fill="#08080f" opacity="0.9"/>
  <text x="620" y="658" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#9b9eb0" text-anchor="middle">tests pass</text>

  <!-- ===== BACK ARCS (needs revision) ===== -->
  <!-- Planning → Brief (needs revision) -->
  <path d="M 560 185 Q 490 185 490 330 Q 490 362 400 362" fill="none" stroke="#ff4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <rect x="452" y="256" width="80" height="18" rx="4" fill="#08080f" opacity="0.9"/>
  <text x="492" y="268" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#ff4444" text-anchor="middle">needs revision</text>

  <!-- InReview → InDevelopment (review failed) -->
  <path d="M 920 475 Q 870 530 760 490" fill="none" stroke="#ff4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <rect x="800" y="494" width="80" height="18" rx="4" fill="#08080f" opacity="0.9"/>
  <text x="840" y="506" font-family="system-ui,'Segoe UI',sans-serif" font-size="9" fill="#ff4444" text-anchor="middle">review failed</text>

  <!-- ===== CORRECT COURSE jump ===== -->
  <rect x="200" y="820" width="200" height="60" rx="10" fill="#ff000018" stroke="#ff4444" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="300" y="846" font-family="system-ui,'Segoe UI',sans-serif" font-size="11"
        font-weight="700" fill="#ff4444" text-anchor="middle">Correct Course</text>
  <text x="300" y="864" font-family="system-ui,'Segoe UI',sans-serif" font-size="10"
        fill="#9b9eb0" text-anchor="middle">escape hatch</text>

  <!-- Any state → Correct Course -->
  <line x1="300" y1="492" x2="300" y2="820" stroke="#ff4444" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7" marker-end="url(#arrow-red)"/>
  <text x="280" y="660" font-family="system-ui,'Segoe UI',sans-serif" font-size="9"
        fill="#ff4444" text-anchor="middle" transform="rotate(-90,280,660)">correct-course</text>

  <!-- Correct Course → Planning (re-enter) -->
  <path d="M 400 850 Q 1280 850 1280 200 Q 1280 140 760 140 Q 700 140 660 168" fill="none"
        stroke="#ff4444" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7" marker-end="url(#arrow-red)"/>
  <text x="1300" y="520" font-family="system-ui,'Segoe UI',sans-serif" font-size="9"
        fill="#ff4444" text-anchor="middle" transform="rotate(90,1300,520)">re-enter any phase</text>

  <!-- Legend -->
  <rect x="48" y="930" width="560" height="100" rx="8" fill="#ffffff05" stroke="#ffffff0f" stroke-width="1"/>
  <text x="68" y="952" font-family="system-ui,'Segoe UI',sans-serif" font-size="10"
        font-weight="700" letter-spacing="0.08em" fill="#6b7280">LEGEND</text>
  <!-- States -->
  <rect x="68" y="960" width="80" height="28" rx="14" fill="#9b59ff18" stroke="#9b59ff" stroke-width="1.5"/>
  <text x="108" y="978" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0" text-anchor="middle">State</text>
  <!-- Forward transition -->
  <line x1="180" y1="974" x2="220" y2="974" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="228" y="978" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">Forward transition</text>
  <!-- Back arc -->
  <line x1="360" y1="974" x2="400" y2="974" stroke="#ff4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <text x="408" y="978" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">Revision / escape</text>
  <!-- Initial/final -->
  <circle cx="88" cy="1010" r="8" fill="#00d4ff"/>
  <text x="104" y="1014" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">Initial state</text>
  <circle cx="200" cy="1010" r="8" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="200" cy="1010" r="4" fill="#22c55e"/>
  <text x="216" y="1014" font-family="system-ui,'Segoe UI',sans-serif" font-size="10" fill="#9b9eb0">Final state</text>

  <!-- Watermark -->
  <text x="1352" y="1042" font-family="system-ui,'Segoe UI',sans-serif" font-size="10"
        letter-spacing="0.06em" fill="#ffffff14" text-anchor="end">BMAD METHOD</text>
</svg>
</body>
</html>
